name: Autoissue Daily PR Sync

on:
  schedule:
    # 20:00 MSK (UTC+3) == 17:00 UTC
    - cron: "0 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: autoissue-daily
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gh
        uses: cli/cli@v2

      - name: Configure git identity
        run: |
          git config user.name "autoissue-bot"
          git config user.email "autoissue-bot@users.noreply.github.com"

      - name: Run daily sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ISSUES_REPO: chelaxian/tg-ytdlp-bot
          AUTOISSUE_BASE: autoissue
          AUTOISSUE_LABEL: autoissue
          AUTOISSUE_TRUSTED_ACTORS: chelaxian,autoissue-bot
          AUTOISSUE_SIGNATURE: AUTOISSUE_BOT_SIGNATURE:v1
        run: |
          python3 scripts/autoissue_daily.py

